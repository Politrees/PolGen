name: Code Linter

on:
  push:
    paths:
      - '**/*.py'
      - '**/*.txt'
      - '.github/workflows/code_linter.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir uv
          uv pip install --no-cache-dir torch==2.7.1 torchaudio==2.7.1 torchvision==0.22.1 --index-url https://download.pytorch.org/whl/cpu -q --system
          uv pip install --no-cache-dir flake8 pylint vulture -r requirements.txt -q --system

      - name: Run flake8
        run: flake8 $(git ls-files '*.py') --max-line-length 140 --max-doc-length 140 --doctests --statistics
        continue-on-error: true

      - name: Run PyLint
        run: pylint $(git ls-files '*.py') --max-line-length 140 --disable=E1101
        continue-on-error: true

      - name: Run Vulture
        run: vulture $(git ls-files '*.py')
        continue-on-error: true

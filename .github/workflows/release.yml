          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: polgen-env

      - name: Create environment and install dependencies (CPU)
        shell: bash -el {0}
        run: |
          conda create -y -p ./env python=${{ env.PYTHON_VERSION }}
          conda activate ./env
          pip install uv
          uv pip install --upgrade setuptools
          uv pip install torch==2.7.1 torchaudio==2.7.1 torchvision==0.22.1 \
            --index-url https://download.pytorch.org/whl/cpu
          uv pip install -r requirements.txt

      - name: Download FFmpeg
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://huggingface.co/Politrees/RVC_resources/resolve/main/tools/ffmpeg/ffmpeg.exe" -OutFile "ffmpeg.exe"
          Invoke-WebRequest -Uri "https://huggingface.co/Politrees/RVC_resources/resolve/main/tools/ffmpeg/ffprobe.exe" -OutFile "ffprobe.exe"

      - name: Download RVC models
        shell: bash -el {0}
        run: |
          conda activate ./env
          python -m assets.model_installer

      - name: Update VERSION file
        run: echo "${{ env.VERSION }}" > VERSION

      - name: Cleanup
        shell: bash -el {0}
        run: |
          find env -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find env -type f -name "*.pyc" -delete 2>/dev/null || true
          find env -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

      - name: Create archive
        shell: powershell
        run: |
          $archiveName = "PolGen-${{ env.VERSION }}_Windows_CPU.zip"
          $tempDir = "PolGen-${{ env.VERSION }}_Windows_CPU"
          
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          
          $excludeItems = @('.git', '.github', '__pycache__', '.ipynb_checkpoints', $tempDir)
          Get-ChildItem -Path . | Where-Object { 
            $item = $_.Name
            -not ($excludeItems | Where-Object { $item -like $_ })
          } | Copy-Item -Destination $tempDir -Recurse -Force
          
          Get-ChildItem -Path $tempDir -Recurse -Force -Directory | 

          find env -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

      - name: Create archive
        run: |
          ARCHIVE_NAME="PolGen-${{ env.VERSION }}_MacOS.zip"
          TEMP_DIR="PolGen-${{ env.VERSION }}_MacOS"
          
          mkdir -p "$TEMP_DIR"
          rsync -a . "$TEMP_DIR" \
            --exclude '.git' --exclude '.github' --exclude '__pycache__' \
            --exclude '*.pyc' --exclude '.ipynb_checkpoints' --exclude '.DS_Store' \
            --exclude "$TEMP_DIR" --exclude '*.zip'
          
          zip -rq "$ARCHIVE_NAME" "$TEMP_DIR"
          rm -rf "$TEMP_DIR"
          
          SIZE_GB=$(echo "scale=2; $(stat -f%z "$ARCHIVE_NAME") / 1024 / 1024 / 1024" | bc)
          echo "Created: $ARCHIVE_NAME ($SIZE_GB GB)"

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          version = os.environ["VERSION"]
          repo_id = os.environ["HF_REPO"]
          token = os.environ["HF_TOKEN"]
          filename = f"PolGen-{version}_MacOS.zip"
          
          if os.path.exists(filename):
              size_gb = os.path.getsize(filename) / (1024 ** 3)
              print(f"Uploading {filename} ({size_gb:.2f} GB)...")
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=f"MacOS/{filename}",
                  repo_id=repo_id,
                  repo_type="model",
                  token=token,
                  commit_message=f"Upload PolGen v{version} for MacOS"
              )
              print("Done!")
          EOF

  # ═══════════════════════════════════════════════════════════════
  # Создание GitHub Release
  # ═══════════════════════════════════════════════════════════════
  create-github-release:
    needs: [prepare, build-windows, build-windows-cpu, build-linux, build-linux-cpu, build-macos]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
      IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: PolGen

      - name: Generate release notes
        run: |
          VERSION="${{ env.VERSION }}"
          HF_REPO="${{ env.HF_REPO }}"
          
          if [[ "${{ env.IS_PRERELEASE }}" == "true" ]]; then
            RELEASE_TYPE="🚧 Pre-release"
            RELEASE_NOTE="⚠️ Это предварительная версия. Используйте на свой страх и риск."
          else
            RELEASE_TYPE="🎉 Стабильный релиз"
            RELEASE_NOTE="✅ Это стабильная версия, рекомендованная для использования."
          fi
          
          cat << NOTES_EOF > release_notes.md
          ## ${RELEASE_TYPE}
          
          ${RELEASE_NOTE}
          
          ---
          
          ### 📥 Скачать
          
          #### 🖥️ Windows
          | Версия | Ссылка | Описание |
          |--------|--------|----------|
          | **CUDA** | [📦 PolGen-${VERSION}_Windows_CUDA.zip](https://huggingface.co/${HF_REPO}/resolve/main/Windows/PolGen-${VERSION}_Windows_CUDA.zip?download=true) | Для NVIDIA GPU (рекомендуется) |
          | **CPU** | [📦 PolGen-${VERSION}_Windows_CPU.zip](https://huggingface.co/${HF_REPO}/resolve/main/Windows/PolGen-${VERSION}_Windows_CPU.zip?download=true) | Для AMD GPU / без GPU |
          
          #### 🐧 Linux
          | Версия | Ссылка | Описание |
          |--------|--------|----------|
          | **CUDA** | [📦 PolGen-${VERSION}_Linux_CUDA.zip](https://huggingface.co/${HF_REPO}/resolve/main/Linux/PolGen-${VERSION}_Linux_CUDA.zip?download=true) | Для NVIDIA GPU (рекомендуется) |
          | **CPU** | [📦 PolGen-${VERSION}_Linux_CPU.zip](https://huggingface.co/${HF_REPO}/resolve/main/Linux/PolGen-${VERSION}_Linux_CPU.zip?download=true) | Для AMD GPU / без GPU |
          
          #### 🍎 MacOS
          | Версия | Ссылка | Описание |
          |--------|--------|----------|
          | **MPS/CPU** | [📦 PolGen-${VERSION}_MacOS.zip](https://huggingface.co/${HF_REPO}/resolve/main/MacOS/PolGen-${VERSION}_MacOS.zip?download=true) | Apple Silicon (MPS) / Intel |
          
          ---
          
          ### 📦 Включено в сборку
          
          - ✅ Python окружение с зависимостями
          - ✅ FFmpeg / FFprobe
          - ✅ Модели RVC (rmvpe.pt, hubert_base.pt)
          - ✅ Модели FlashSR
          
          ---
          
          ### 🚀 Быстрый старт
          
          1. Скачайте архив для вашей ОС
          2. Распакуйте в любое место
          3. Запустите:
             - **Windows**: \`run-PolGen.bat\`
             - **Linux/MacOS**: \`chmod +x run-PolGen.sh && ./run-PolGen.sh\`
          
          ---
          
          ### 💻 Системные требования
          
          | Платформа | GPU | RAM | Диск |
          |-----------|-----|-----|------|
          | Windows (CUDA) | NVIDIA | 8+ GB | ~10 GB |
          | Windows (CPU) | Любой / без GPU | 16+ GB | ~3 GB |
          | Linux (CUDA) | NVIDIA | 8+ GB | ~12 GB |
          | Linux (CPU) | Любой / без GPU | 16+ GB | ~3 GB |
          | MacOS | Apple Silicon / Intel | 8+ GB | ~5 GB |
          
          ---
          
          📚 **Документация**: [README](https://github.com/Politrees/PolGen#readme)
          🐛 **Сообщить о проблеме**: [Issues](https://github.com/Politrees/PolGen/issues)
          💬 **Telegram**: [Канал](https://t.me/pol1trees) | [Чат](https://t.me/+GMTP7hZqY0E4OGRi)
          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: PolGen ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

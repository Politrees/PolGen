          echo "Created: $ARCHIVE_NAME ($SIZE_GB GB)"

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          version = os.environ["VERSION"]
          repo_id = os.environ["HF_REPO"]
          token = os.environ["HF_TOKEN"]
          filename = f"PolGen-{version}_Linux_CPU.zip"
          
          if os.path.exists(filename):
              size_gb = os.path.getsize(filename) / (1024 ** 3)
              print(f"Uploading {filename} ({size_gb:.2f} GB)...")
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=f"Linux/{filename}",
                  repo_id=repo_id,
                  repo_type="model",
                  token=token,
                  commit_message=f"Upload PolGen v{version} for Linux (CPU)"
              )
              print("Done!")
          EOF

  # ═══════════════════════════════════════════════════════════════
  # MacOS (MPS/CPU)
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    needs: prepare
    if: needs.prepare.outputs.build_macos == 'true'
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: PolGen

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: polgen-env


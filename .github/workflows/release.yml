          Compress-Archive -Path $tempDir -DestinationPath $archiveName -Force
          Remove-Item -Path $tempDir -Recurse -Force
          
          $sizeGB = [math]::Round((Get-Item $archiveName).Length / 1GB, 2)
          Write-Host "Created: $archiveName ($sizeGB GB)"

      - name: Setup Python for upload
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upload to HuggingFace
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          version = os.environ["VERSION"]
          repo_id = os.environ["HF_REPO"]
          token = os.environ["HF_TOKEN"]
          filename = f"PolGen-{version}_Windows_CPU.zip"
          
          if os.path.exists(filename):
              size_gb = os.path.getsize(filename) / (1024 ** 3)
              print(f"Uploading {filename} ({size_gb:.2f} GB)...")
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=f"Windows/{filename}",
                  repo_id=repo_id,
                  repo_type="model",
                  token=token,
                  commit_message=f"Upload PolGen v{version} for Windows (CPU)"
              )
              print("Done!")
          EOF

  # ═══════════════════════════════════════════════════════════════
  # Linux (CUDA)
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    needs: prepare
    if: needs.prepare.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift
          sudo apt-get clean

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: PolGen

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: polgen-env

      - name: Create environment and install dependencies
        shell: bash -el {0}
        run: |
          conda create -y -p ./env python=${{ env.PYTHON_VERSION }}
          conda activate ./env
          pip install uv
          uv pip install --upgrade setuptools
          uv pip install torch==2.7.1 torchaudio==2.7.1 torchvision==0.22.1 \
            --index-url https://download.pytorch.org/whl/cu128
          uv pip install -r requirements.txt

      - name: Download FFmpeg
        run: |
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg ffmpeg-*-amd64-static/ffprobe .
          chmod +x ffmpeg ffprobe
          rm -rf ffmpeg-*-amd64-static*

      - name: Download RVC models
        shell: bash -el {0}
        run: |
          conda activate ./env
          python -m assets.model_installer

      - name: Update VERSION file
        run: echo "${{ env.VERSION }}" > VERSION

      - name: Cleanup
        run: |
          rm -rf ~/.cache/uv ~/.cache/pip 2>/dev/null || true
          find env -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find env -type f -name "*.pyc" -delete 2>/dev/null || true
          find env -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find env -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

      - name: Create archive
        run: |
          ARCHIVE_NAME="PolGen-${{ env.VERSION }}_Linux_CUDA.zip"
          TEMP_DIR="PolGen-${{ env.VERSION }}_Linux_CUDA"
          
          mkdir -p "$TEMP_DIR"
          rsync -a . "$TEMP_DIR" \
            --exclude '.git' --exclude '.github' --exclude '__pycache__' \
            --exclude '*.pyc' --exclude '.ipynb_checkpoints' \
            --exclude "$TEMP_DIR" --exclude '*.zip' --exclude '*.tar.xz'
          
          zip -rq "$ARCHIVE_NAME" "$TEMP_DIR"
          rm -rf "$TEMP_DIR"
          
          SIZE_GB=$(echo "scale=2; $(stat --printf="%s" "$ARCHIVE_NAME") / 1024 / 1024 / 1024" | bc)
          echo "Created: $ARCHIVE_NAME ($SIZE_GB GB)"

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          version = os.environ["VERSION"]
          repo_id = os.environ["HF_REPO"]
          token = os.environ["HF_TOKEN"]
          filename = f"PolGen-{version}_Linux_CUDA.zip"
          
          if os.path.exists(filename):
              size_gb = os.path.getsize(filename) / (1024 ** 3)
              print(f"Uploading {filename} ({size_gb:.2f} GB)...")
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=f"Linux/{filename}",
                  repo_id=repo_id,
                  repo_type="model",
                  token=token,
                  commit_message=f"Upload PolGen v{version} for Linux (CUDA)"
              )
              print("Done!")
          EOF

